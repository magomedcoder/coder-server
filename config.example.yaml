host: "127.0.0.1"
port: 8000

runners:
  - addr: "127.0.0.1:50052"
    name: local
    hints:
      max_context_tokens: 8192

context:
  token_budget: 8192
  scan_secrets: true

reliability:
  runner_retries: 2
  circuit_breaker_failures: 3
  circuit_breaker_cooldown_seconds: 30
  max_concurrent_requests: 8
  queue_wait_seconds: 60

rate_limit:
  requests_per_minute: 120

sse:
  buffer_ttl_seconds: 300

logging:
  structured: false

chat:
  timeout_seconds: 300
  history_max_messages: 40
  generate:
    max_tokens: 1024
    temperature: 0.2

agent:
  max_tokens: 2048
  temperature: 0.1
  max_steps: 30
  # allowed_paths: ["src/", "tests/"]
  blocked_commands: ["rm -rf /", "mkfs.", ":(){ :|:& };:", "curl | sh", "wget | sh", "curl | bash", "wget | bash", "sudo ", "chmod 777 /", "dd if="]

# quotas:
#   max_tokens_per_day: 500000

index:
  max_chunks_per_workspace: 10000
  search_workers: 4

# mcp:
#   servers:
#     - id: 1
#       name: wiki
#       transport: streamable
#       url: "http://127.0.0.1:8090/mcp"
#       timeout_seconds: 120

idempotency:
  ttl_seconds: 300

security:
  moderation_enabled: true

cache:
  prompt_prefix_entries: 256
